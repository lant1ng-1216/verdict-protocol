<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meme Court Verdict</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
    }

    .header {
      background: #1a1a18;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo { font-size: 22px; }
    .header-text h1 {
      font-size: 15px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -.02em;
    }
    .header-text p {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-top: 1px;
    }

    .status-card {
      margin: 12px;
      background: #ffffff;
      border: 1px solid #e8e6e0;
      border-radius: 12px;
      padding: 14px;
    }
    .status-label {
      font-size: 10px;
      font-weight: 700;
      color: #8a8a87;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #16a34a;
      flex-shrink: 0;
    }
    .status-dot.inactive { background: #d1d5db; }
    .status-text {
      font-size: 12px;
      color: #4a4a47;
    }
    .status-addr {
      font-family: 'SF Mono', monospace;
      font-size: 11px;
      color: #ff6340;
      background: #fff5f2;
      border-radius: 6px;
      padding: 6px 10px;
      margin-top: 6px;
      word-break: break-all;
    }
    .status-addr.empty {
      color: #b0aea8;
      background: #f5f4f0;
    }

    .verdict-card {
      margin: 0 12px 12px;
      background: #ffffff;
      border: 1px solid #e8e6e0;
      border-radius: 12px;
      overflow: hidden;
      display: none;
    }
    .verdict-card.show { display: block; }
    .verdict-top {
      padding: 12px 14px 10px;
      border-bottom: 1px solid #f0ede8;
    }
    .verdict-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
    }
    .verdict-conf {
      font-size: 11px;
      color: #6b6b68;
      margin-left: 6px;
    }
    .verdict-risk {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .verdict-short {
      font-size: 12px;
      font-weight: 600;
      color: #1a1a18;
      line-height: 1.5;
    }
    .verdict-reason {
      padding: 8px 14px;
      font-size: 11px;
      color: #6b6b68;
      line-height: 1.6;
    }

    .actions {
      padding: 0 12px 12px;
      display: flex;
      gap: 8px;
    }
    .btn-primary {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 9px;
      background: #ff6340;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      background: transparent;
      border: 1.5px solid #e8e6e0;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #4a4a47;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: #ff6340; color: #ff6340; }

    .supported {
      padding: 0 12px 12px;
    }
    .supported-label {
      font-size: 10px;
      font-weight: 700;
      color: #8a8a87;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .supported-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .supported-tag {
      font-size: 10px;
      font-weight: 600;
      color: #4a4a47;
      background: #ffffff;
      border: 1px solid #e8e6e0;
      border-radius: 99px;
      padding: 3px 10px;
    }

    .footer {
      padding: 8px 12px 12px;
      text-align: center;
      font-size: 10px;
      color: #b0aea8;
    }
    .footer a { color: #ff6340; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">⚖️</div>
    <div class="header-text">
      <h1>Meme Court Verdict</h1>
      <p>链上 AI 裁定 · BNB Chain</p>
    </div>
  </div>

  <!-- 当前检测状态 -->
  <div class="status-card">
    <div class="status-label">当前页面</div>
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">正在检测合约地址…</div>
    </div>
    <div class="status-addr" id="statusAddr">—</div>
  </div>

  <!-- 裁定结果（有数据时显示） -->
  <div class="verdict-card" id="verdictCard">
    <div class="verdict-top">
      <div>
        <span class="verdict-badge" id="verdictBadge">—</span>
        <span class="verdict-conf" id="verdictConf">—</span>
      </div>
      <div class="verdict-risk" id="verdictRisk">—</div>
      <div class="verdict-short" id="verdictShort">—</div>
    </div>
    <div class="verdict-reason" id="verdictReason">—</div>
  </div>

  <!-- 操作按钮 -->
  <div class="actions">
    <a class="btn-primary" href="https://memecourt.online" target="_blank" id="btnFull">查看完整裁定 →</a>
    <a class="btn-secondary" href="https://memecourt.online" target="_blank">立案</a>
  </div>

  <!-- 支持的平台 -->
  <div class="supported">
    <div class="supported-label">支持的平台</div>
    <div class="supported-list">
      <span class="supported-tag">DexScreener</span>
      <span class="supported-tag">GMGN</span>
      <span class="supported-tag">four.meme</span>
      <span class="supported-tag">Ave.ai</span>
    </div>
  </div>

  <div class="footer">
    <a href="https://memecourt.online" target="_blank">memecourt.online</a>
    · BNB Chain · AI Verdict
  </div>

  <script src="popup.js"></script>
</body>
</html>
